<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Disaster Alert & Safety Assistant</title>
    <link rel="stylesheet" href="index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Leaflet Maps -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
</head>
<body class="dark-mode">
    <div class="app-container">
        <!-- Header -->
        <header>
            <div class="logo">
                <span class="pulse-ring"></span>
                <span class="icon">⚠️</span>
                <h1>Guardian AI</h1>
            </div>
            <div class="status-bar">
                <span id="voice-indicator" class="voice-off">🎙️</span>
                <span id="system-status" class="online">SYSTEM ONLINE</span>
                <span id="current-time">00:00:00</span>
            </div>
        </header>

        <!-- Main Dashboard View -->
        <main id="main-content">
            <!-- Hero Section / Dynamic Alerts -->
            <section id="alert-display" class="alert-section">
                <div class="welcome-overlay" id="welcome-view">
                    <div class="hero-content">
                        <h2>Ready to Assist</h2>
                        <p>Provide your location and situation to get real-time safety alerts and guidance.</p>
                        <div class="scanning-animation">
                            <div class="line"></div>
                            <div class="line"></div>
                        </div>
                    </div>
                </div>
                
                <!-- Results Area (Initially Hidden) -->
                <div id="results-view" class="hidden">
                    <div class="alert-card" id="main-alert">
                        <div class="alert-header">
                            <span id="risk-badge" class="badge">RISK LEVEL</span>
                            <h3 id="disaster-type">Disaster Detection</h3>
                        </div>
                        <p id="alert-message">Scanning for threats...</p>
                        <div class="location-tag">📍 <span id="display-location">Location</span></div>
                    </div>

                    <!-- Map Container -->
                    <div id="map-container" class="map-wrapper">
                        <div id="map"></div>
                    </div>

                    <div class="tabs-container">
                        <div class="tabs">
                            <button class="tab-btn active" data-tab="safety">Safety Actions</button>
                            <button class="tab-btn" data-tab="contacts">Emergency Contacts</button>
                            <button class="tab-btn" data-tab="raw-json">System Output</button>
                        </div>
                        
                        <div class="tab-content" id="safety-tab">
                            <ul id="safety-steps-list">
                                <!-- Steps injected here -->
                            </ul>
                        </div>
                        
                        <div id="contacts-tab" class="tab-content hidden">
                            <div id="emergency-contacts-grid" class="contacts-grid">
                                <!-- Contacts injected here -->
                            </div>
                        </div>

                        <div id="raw-json-tab" class="tab-content hidden">
                            <pre id="json-output"></pre>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <!-- Interaction Area -->
        <footer class="interaction-area">
            <div class="chat-container">
                <div id="chat-history" class="chat-history hidden"></div>
                <div class="input-group">
                    <input type="text" id="user-input" placeholder="Type your location or situation (e.g., Chennai - heavy rain)..." autocomplete="off">
                    <button id="send-btn">
                        <svg viewBox="0 0 24 24" width="24" height="24">
                            <path fill="currentColor" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                        </svg>
                    </button>
                </div>
                <div class="quick-chips">
                    <button class="chip">San Francisco, Earthquake</button>
                    <button class="chip">Mumbai, Flooding</button>
                    <button class="chip">Australia, Bushfire</button>
                </div>
            </div>
        </footer>
    </div>
    <script src="main.js"></script>
</body>
</html>
